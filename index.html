<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Guessing Game</title>
        <link rel="stylesheet" href="css/style.css">
        <script src="js/main.js" defer></script>
    </head>

    <body>
        <button type="buton" id="help-btn">?</button>
        <header>
            <h1 class="title" id="main-title">Guessing game!</h1>
        </header>

        <main>
            <section class="game-container">
                <h2>Guess the Number!</h2>

                <div id="difficulty-settings">
                    <label>Difficulty</label>
                    <button type="button" class="btn" id="difficulty-btn">Easy</button>
                </div>
                
                <form id="game-form">
                    <input type="number" id="guess" placeholder="1-100" min="1" max="100" step="1" required>

                    <nav id="controls">
                        <button type="submit" id="submit-btn" disabled>Guess</button>
                        <button type="button" id="reset-btn" style="display:none;">Play Again</button>
                    </nav>
                </form>

                <aside id="status">
                    <p id="message"></p>
                    <p>Previous guesses: <span id="history">None</span></p>
                    <p>Attempts: <span id="attempt-count">0</span></p>
                    <p>Win Streak: <span id="streak-count">0</span></p>
                </aside>
            </section>


        </main>
        
        <dialog id="help-modal">
            <h2>How to Play</h2>
            <ul>
                <li>Pick a difficulty</li>
                <li>Try to guess the number</li>
                <li>You have 10 lives</li>
            </ul>
            <button id="close-help">Got it!</button>

        </dialog>
    </body>
</html>
